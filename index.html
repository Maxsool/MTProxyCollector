<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTProxy List</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white">

<div class="max-w-3xl mx-auto p-5">

    <!-- Header -->
    <h1 class="text-3xl font-bold text-cyan-400 mb-4">
        ⚡ MTProxy Nexus
    </h1>

    <!-- Search -->
    <input id="search" placeholder="Search proxy..."
        class="w-full p-3 rounded-xl bg-slate-800 outline-none mb-4">

    <!-- List -->
    <div id="list" class="space-y-3"></div>

</div>

<script>
let allProxies = [];

async function load() {
    const res = await fetch("proxy.txt?cache=" + Date.now());
    const text = await res.text();

    allProxies = text.split("\n").filter(Boolean);

    render(allProxies);
}

function render(data) {
    const list = document.getElementById("list");
    list.innerHTML = "";

    if (!data.length) {
        list.innerHTML = "<p class='text-red-400'>No proxies found</p>";
        return;
    }

    data.forEach(p => {
        const box = document.createElement("div");
        box.className = "bg-slate-800 p-3 rounded-xl flex justify-between items-center";

        box.innerHTML = `
            <a href="${p}" target="_blank"
               class="text-cyan-300 break-all text-sm">
               ${p}
            </a>

            <button onclick="copy('${p}')"
                class="bg-cyan-500 px-3 py-1 rounded-lg text-sm">
                Copy
            </button>
        `;

        list.appendChild(box);
    });
}

// search
document.getElementById("search").addEventListener("input", e => {
    const val = e.target.value.toLowerCase();
    render(allProxies.filter(p => p.toLowerCase().includes(val)));
});

// copy
function copy(t) {
    navigator.clipboard.writeText(t);
    alert("Copied!");
}

load();
</script>

</body>
</html>
