```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTProxy Rasool</title>

<script src="https://cdn.tailwindcss.com"></script>
    
<style>
body{
    background:#020617;
}
.card{
    transition:.2s;
}
.card:hover{
    transform:translateY(-2px);
}
</style>

</head>

<body class="text-white">

<div class="max-w-5xl mx-auto p-5">

    <div class="flex justify-between items-center mb-5">
        <h1 class="text-3xl font-bold text-cyan-400">
            ⚡ MTProxy Rasool
        </h1>

        <div id="count"
             class="bg-cyan-500/20 text-cyan-300 px-4 py-2 rounded-xl">
            0
        </div>
    </div>

    <input
        id="search"
        type="text"
        placeholder="Search server..."
        class="w-full mb-5 p-3 rounded-xl bg-slate-900 border border-slate-800 outline-none">

    <div id="list"
         class="grid md:grid-cols-2 gap-4">
    </div>

</div>

<script>

let proxies = [];

async function loadProxies() {

    const res = await fetch("proxy.json?cache=" + Date.now());
    proxies = await res.json();

    render(proxies);
}

function render(data){

    document.getElementById("count").innerText =
        data.length + " Proxies";

    const list = document.getElementById("list");

    list.innerHTML = "";

    if(data.length === 0){
        list.innerHTML =
            "<div class='text-red-400'>No proxies found</div>";
        return;
    }

    data.forEach(proxy => {

        const card = document.createElement("div");

        card.className =
            "card bg-slate-900 border border-slate-800 rounded-2xl p-4";

        card.innerHTML = `

            <div class="text-cyan-400 font-bold break-all">
                ${proxy.server}
            </div>

            <div class="text-slate-400 text-sm mt-1">
                Port: ${proxy.port}
            </div>

            <div class="flex gap-2 mt-4">

                <a
                    href="${proxy.url}"
                    target="_blank"
                    class="flex-1 text-center bg-green-600 hover:bg-green-500 px-3 py-2 rounded-xl">
                    Connect
                </a>

                <button
                    onclick="copyProxy('${proxy.url}')"
                    class="bg-cyan-600 hover:bg-cyan-500 px-3 py-2 rounded-xl">
                    Copy
                </button>

            </div>

        `;

        list.appendChild(card);
    });
}

function copyProxy(text){

    navigator.clipboard.writeText(text);

    alert("Copied");
}

document
.getElementById("search")
.addEventListener("input", e => {

    const q = e.target.value.toLowerCase();

    const filtered = proxies.filter(p =>
        p.server.toLowerCase().includes(q) ||
        p.port.includes(q)
    );

    render(filtered);
});

loadProxies();

</script>

</body>
</html>
```
